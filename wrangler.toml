name = "fitness-coach"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Custom domain. Requires `mealfix.club` to be a Cloudflare-managed zone
# on the same account (mehulkapadia15@gmail.com). Cloudflare auto-provisions
# DNS + SSL for the subdomain on deploy.
[[routes]]
pattern = "bios.mealfix.club"
custom_domain = true

# D1 binding. Run `wrangler d1 create fitness-coach` and paste the printed
# database_id below before running `wrangler dev` or `wrangler deploy`.
[[d1_databases]]
binding = "DB"
database_name = "fitness-coach"
database_id = "16fb466a-f590-4109-81b6-57d7462bb772"
migrations_dir = "migrations"

# KV namespace used by @cloudflare/workers-oauth-provider for OAuth state
# (clients, grants, tokens, plus our pending-auth records during the
# Google sign-in round-trip). Create once via:
#   npx wrangler kv namespace create OAUTH_KV
# then paste the printed `id` below.
[[kv_namespaces]]
binding = "OAUTH_KV"
id = "db32d58aaf0b47aa893b79f798fbf23c"

# Secrets to set after first deploy:
#   npx wrangler secret put GOOGLE_CLIENT_ID
#   npx wrangler secret put GOOGLE_CLIENT_SECRET
